<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yüz Kayıt ve İşaretleme (Kalıcı Hafızalı)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        #media-area { position: relative; width: 400px; height: 400px; margin: 20px auto; border: 3px dashed #ccc; border-radius: 10px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; display: none; }
        
        .btn { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; font-size: 15px; border-radius: 5px; cursor: pointer; margin: 5px; transition: 0.3s; }
        .btn:hover { background-color: #45a049; }
        .btn-secondary { background-color: #008CBA; }
        .btn-secondary:hover { background-color: #007B9A; }
        .btn-danger { background-color: #f44336; }
        .btn-danger:hover { background-color: #da190b; }
        
        #file-input { display: none; }
        .step-desc { font-size: 14px; color: #666; margin-bottom: 15px; }
        #system-info { color: #d32f2f; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Yüz Biyometrisi Kayıt Paneli</h2>
    <p id="system-info">Sistemde kayıtlı yüz aranıyor...</p>
    <p class="step-desc">Adım 1: Kameradan fotoğraf çekin veya bilgisayarınızdan bir yüz resmi yükleyin.</p>
    
    <div>
        <button id="start-camera" class="btn btn-secondary">Kamerayı Aç</button>
        <button id="capture-photo" class="btn" style="display:none;">Fotoğraf Çek</button>
        <label for="file-input" class="btn btn-secondary">Dosya Yükle</label>
        <input type="file" id="file-input" accept="image/*">
        <button id="reset-btn" class="btn btn-danger" style="display:none;">Tümünü Sıfırla</button>
    </div>

    <div id="media-area">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="face-canvas" width="400" height="400"></canvas>
    </div>

    <p class="step-desc">Adım 2: Resim geldikten sonra üzerine tıklayarak biyometrik noktaları işaretleyin.</p>
    <button id="send-data" class="btn" style="background-color: #ff9800;">Biyometriyi Kaydet ve Doğrulamaya Gönder</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    // Firebase kütüphanesine veri okumak için 'get' modülünü ekledik
    import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD_DeLxJMTyRgQ3Agz0zYAen47XqA2Kq9Y",
        authDomain: "biyo-9104d.firebaseapp.com",
        projectId: "biyo-9104d",
        storageBucket: "biyo-9104d.firebasestorage.app",
        messagingSenderId: "796487556743",
        appId: "1:796487556743:web:e72c1c8f366930f73b2222"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('face-canvas');
    const ctx = canvas.getContext('2d');
    
    const startCamBtn = document.getElementById('start-camera');
    const captureBtn = document.getElementById('capture-photo');
    const fileInput = document.getElementById('file-input');
    const resetBtn = document.getElementById('reset-btn');
    const sendBtn = document.getElementById('send-data');
    const systemInfo = document.getElementById('system-info');

    let stream = null;
    let selectedPoints = [];
    let isImageLoaded = false;

    // --- YENİ EKLENEN BÖLÜM: SAYFA AÇILDIĞINDA ESKİ KAYDI GETİR ---
    get(ref(db, 'biometricGame/registeredProfile')).then((snapshot) => {
        if (snapshot.exists()) {
            const data = snapshot.val();
            const img = new Image();
            
            img.onload = function() {
                video.style.display = "none";
                canvas.style.display = "block";
                
                // Kayıtlı resmi çiz
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                isImageLoaded = true;
                
                // Kayıtlı noktaları çiz
                selectedPoints = data.points || [];
                selectedPoints.forEach(p => {
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                });

                systemInfo.innerText = "✅ Daha önceden kaydedilmiş yüz veriniz başarıyla yüklendi.";
                systemInfo.style.color = "#4CAF50";
                resetBtn.style.display = "inline-block";
            }
            img.src = data.image; // Base64 kodunu resme çevirir
        } else {
            systemInfo.innerText = "Sistemde kayıtlı yüz bulunamadı. Lütfen yeni kayıt oluşturun.";
            systemInfo.style.color = "#666";
        }
    }).catch((error) => {
        systemInfo.innerText = "Bağlantı hatası!";
    });
    // -------------------------------------------------------------

    // Kamerayı Başlat
    startCamBtn.addEventListener('click', async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 400 } });
            video.srcObject = stream;
            video.style.display = "block";
            canvas.style.display = "none";
            captureBtn.style.display = "inline-block";
            resetBtn.style.display = "inline-block";
            systemInfo.innerText = "Yeni kayıt oluşturuluyor...";
            systemInfo.style.color = "#666";
        } catch (err) {
            alert("Kameraya erişilemedi!");
        }
    });

    // Kameradan Fotoğraf Çek
    captureBtn.addEventListener('click', () => {
        if (!stream) return;
        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        stream.getTracks().forEach(track => track.stop());
        video.style.display = "none";
        canvas.style.display = "block";
        captureBtn.style.display = "none";
        isImageLoaded = true;
        selectedPoints = []; // Eski noktaları temizle
    });

    // Dosya Yükle
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                if (stream) stream.getTracks().forEach(track => track.stop());
                video.style.display = "none";
                canvas.style.display = "block";
                resetBtn.style.display = "inline-block";
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                isImageLoaded = true;
                selectedPoints = [];
                systemInfo.innerText = "Yeni resim yüklendi.";
                systemInfo.style.color = "#666";
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // Nokta İşaretleme
    canvas.addEventListener('click', (event) => {
        if (!isImageLoaded) return;

        const rect = canvas.getBoundingClientRect();
        const x = (event.clientX - rect.left) * (canvas.width / rect.width);
        const y = (event.clientY - rect.top) * (canvas.height / rect.height);

        selectedPoints.push({ x, y });

        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
    });

    // Her Şeyi Sıfırla ve Veritabanından Sil
    resetBtn.addEventListener('click', () => {
        if (stream) stream.getTracks().forEach(track => track.stop());
        video.style.display = "block";
        video.srcObject = null;
        canvas.style.display = "none";
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        selectedPoints = [];
        isImageLoaded = false;
        captureBtn.style.display = "none";
        resetBtn.style.display = "none";
        
        // Veritabanındaki eski profili sil
        remove(ref(db, 'biometricGame/registeredProfile'));
        systemInfo.innerText = "Sistemdeki yüz veriniz silindi. Lütfen yeni kayıt oluşturun.";
        systemInfo.style.color = "#d32f2f";
    });

    // Veriyi Veritabanına Kalıcı Kaydet ve Taramaya Sinyal Gönder
    sendBtn.addEventListener('click', () => {
        if (!isImageLoaded || selectedPoints.length === 0) {
            alert("Lütfen bir resim ekleyin ve en az bir nokta işaretleyin!");
            return;
        }

        // 1. Resmi Base64 koduna çevir (kalite 0.6 ile Firebase'i yormayalım)
        const imageData = canvas.toDataURL('image/jpeg', 0.6);

        // 2. Hem resmi hem noktaları "Kalıcı Profile" yaz
        set(ref(db, 'biometricGame/registeredProfile'), {
            image: imageData,
            points: selectedPoints
        });

        // 3. Tarama sayfasına "Tarama Yap" sinyali gönder
        set(ref(db, 'biometricGame/scanData'), {
            status: "pending", 
            timestamp: Date.now()
        }).then(() => {
            alert("Veriler kalıcı olarak kaydedildi ve doğrulamaya gönderildi!");
            systemInfo.innerText = "✅ Yüz veriniz sisteme kalıcı olarak kaydedildi.";
            systemInfo.style.color = "#4CAF50";
        }).catch((error) => {
            console.error("Hata:", error);
        });
    });
</script>
</body>
</html>
